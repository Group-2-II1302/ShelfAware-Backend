name: Deploy to Cloudflare

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "static/**"
      - "package.json"
      - "package-lock.json"
      - "svelte.config.js"
      - "vite.config.*"
      - "tsconfig.json"
      - "wrangler.toml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "static/**"
      - "package.json"
      - "package-lock.json"
      - "svelte.config.js"
      - "vite.config.*"
      - "tsconfig.json"
      - "wrangler.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
      url: ${{ github.event_name == 'pull_request' && format('https://preview-{0}.{1}.pages.dev', github.event.pull_request.number, vars.PROJECT_NAME) || vars.APP_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=${{ vars.PROJECT_NAME }} --branch=${{ github.event_name == 'pull_request' && format('preview-{0}', github.event.pull_request.number) || 'main' }}
